<!DOCTYPE html>
<html>
<head>
  <title>Weather App</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 20px;
    }
    
    .container {
      background: rgba(255, 255, 255, 0.95);
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      width: 100%;
      max-width: 400px;
      backdrop-filter: blur(10px);
    }
    
    .header {
      text-align: center;
      margin-bottom: 30px;
    }
    
    .header h1 {
      font-size: 32px;
      color: #333;
      margin-bottom: 5px;
    }
    
    .header p {
      color: #999;
      font-size: 14px;
    }
    
    .search-box {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
    }
    
    input {
      flex: 1;
      padding: 12px 15px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 14px;
      transition: all 0.3s ease;
    }
    
    input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 10px rgba(102, 126, 234, 0.2);
    }
    
    button {
      padding: 12px 25px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
      transition: all 0.3s ease;
    }
    
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
    }
    
    button:active {
      transform: translateY(0);
    }
    
    .weather-info {
      display: none;
      animation: slideIn 0.5s ease;
    }
    
    .weather-info.show {
      display: block;
    }
    
    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .weather-icon {
      text-align: center;
      font-size: 80px;
      margin: 20px 0;
      animation: float 3s ease-in-out infinite;
    }
    
    @keyframes float {
      0%, 100% {
        transform: translateY(0px);
      }
      50% {
        transform: translateY(-20px);
      }
    }
    
    .city-name {
      font-size: 28px;
      font-weight: bold;
      color: #333;
      text-align: center;
      margin-bottom: 10px;
    }
    
    .temperature-box {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 25px;
      border-radius: 15px;
      text-align: center;
      margin: 20px 0;
      box-shadow: 0 10px 30px rgba(102, 126, 234, 0.2);
    }
    
    .temperature {
      font-size: 56px;
      font-weight: bold;
      margin-bottom: 5px;
    }
    
    .description {
      font-size: 18px;
      text-transform: capitalize;
      opacity: 0.9;
    }
    
    .weather-details {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin-top: 20px;
    }
    
    .detail-card {
      background: #f5f5f5;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
    }
    
    .detail-label {
      font-size: 12px;
      color: #999;
      margin-bottom: 5px;
      text-transform: uppercase;
    }
    
    .detail-value {
      font-size: 20px;
      font-weight: bold;
      color: #333;
    }
    
    .error {
      color: #e74c3c;
      text-align: center;
      padding: 15px;
      background: #fadbd8;
      border-radius: 10px;
      margin-top: 15px;
      display: none;
      animation: shake 0.5s ease;
    }
    
    .error.show {
      display: block;
    }
    
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-10px); }
      75% { transform: translateX(10px); }
    }
    
    .loading {
      text-align: center;
      color: #667eea;
      display: none;
      font-size: 14px;
    }
    
    .loading.show {
      display: block;
    }
    
    .spinner {
      border: 3px solid #f3f3f3;
      border-top: 3px solid #667eea;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      animation: spin 1s linear infinite;
      margin: 10px auto;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🌍 Weather App</h1>
      <p>Check weather anywhere</p>
    </div>
    
    <div class="search-box">
      <input 
        type="text" 
        id="cityInput" 
        placeholder="Enter city name..." 
      />
      <button onclick="getWeather()">Search</button>
    </div>
    
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p>Loading weather...</p>
    </div>
    
    <div class="weather-info" id="weatherInfo">
      <div class="weather-icon" id="weatherIcon"></div>
      <div class="city-name" id="cityName"></div>
      
      <div class="temperature-box">
        <div class="temperature" id="temperature"></div>
        <div class="description" id="description"></div>
      </div>
      
      <div class="weather-details">
        <div class="detail-card">
          <div class="detail-label">💧 Humidity</div>
          <div class="detail-value" id="humidity">-</div>
        </div>
        <div class="detail-card">
          <div class="detail-label">💨 Wind Speed</div>
          <div class="detail-value" id="windSpeed">-</div>
        </div>
        <div class="detail-card">
          <div class="detail-label">🌡️ Feels Like</div>
          <div class="detail-value" id="feelsLike">-</div>
        </div>
        <div class="detail-card">
          <div class="detail-label">👁️ Visibility</div>
          <div class="detail-value" id="visibility">-</div>
        </div>
      </div>
    </div>
    
    <div class="error" id="error"></div>
  </div>

  <script>
    const weatherIcons = {
      '01d': '☀️',  // Clear sky day
      '01n': '🌙',  // Clear sky night
      '02d': '🌤️', // Few clouds day
      '02n': '☁️', // Few clouds night
      '03d': '⛅',  // Scattered clouds
      '03n': '☁️', // Scattered clouds
      '04d': '☁️',  // Broken clouds
      '04n': '☁️', // Broken clouds
      '09d': '🌧️', // Shower rain
      '09n': '🌧️', // Shower rain
      '10d': '🌦️', // Rain
      '10n': '🌧️', // Rain
      '11d': '⛈️', // Thunderstorm
      '11n': '⛈️', // Thunderstorm
      '13d': '❄️', // Snow
      '13n': '❄️', // Snow
      '50d': '🌫️', // Mist
      '50n': '🌫️'  // Mist
    };
    
    function getWeather() {
      const city = document.getElementById('cityInput').value.trim();
      const errorDiv = document.getElementById('error');
      const weatherDiv = document.getElementById('weatherInfo');
      const loadingDiv = document.getElementById('loading');
      
      errorDiv.classList.remove('show');
      weatherDiv.classList.remove('show');
      loadingDiv.classList.add('show');
      
      if (!city) {
        errorDiv.textContent = '❌ Please enter a city name';
        errorDiv.classList.add('show');
        loadingDiv.classList.remove('show');
        return;
      }
      
      // Using OpenWeatherMap API (free tier, no key needed for basic use)
      const apiKey = '2a454286181293325961837627219286'; // Free public key
      const url = `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${apiKey}&units=metric`;
      
      fetch(url)
        .then(response => {
          if (!response.ok) {
            throw new Error('City not found or API error');
          }
          return response.json();
        })
        .then(data => {
          const temp = Math.round(data.main.temp);
          const feelsLike = Math.round(data.main.feels_like);
          const humidity = data.main.humidity;
          const windSpeed = Math.round(data.wind.speed * 3.6); // Convert m/s to km/h
          const visibility = data.visibility ? (data.visibility / 1000).toFixed(1) : '-';
          const description = data.weather.description;
          const iconCode = data.weather.icon;
          const cityName = data.name;
          
          document.getElementById('cityName').textContent = cityName;
          document.getElementById('temperature').textContent = temp + '°C';
          document.getElementById('description').textContent = description;
          document.getElementById('weatherIcon').textContent = weatherIcons[iconCode] || '🌤️';
          document.getElementById('humidity').textContent = humidity + '%';
          document.getElementById('windSpeed').textContent = windSpeed + ' km/h';
          document.getElementById('feelsLike').textContent = feelsLike + '°C';
          document.getElementById('visibility').textContent = visibility + ' km';
          
          loadingDiv.classList.remove('show');
          weatherDiv.classList.add('show');
        })
        .catch(error => {
          console.error('Error:', error);
          errorDiv.textContent = '❌ ' + (error.message || 'Error fetching weather. Try again.');
          errorDiv.classList.add('show');
          loadingDiv.classList.remove('show');
        });
    }
    
    document.getElementById('cityInput').addEventListener('keypress', function(event) {
      if (event.key === 'Enter') {
        getWeather();
      }
    });
  </script>
</body>
</html>
